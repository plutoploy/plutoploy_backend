services:
  bun:
    build: .
    container_name: mdebzoti
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    container_name: plutoploy-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-plutoploy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-plutoploy}
      POSTGRES_DB: ${POSTGRES_DB:-plutoploy}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
